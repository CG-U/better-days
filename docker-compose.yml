services:
  web:
    image: node:22-bookworm-slim
    container_name: better-days-web
    working_dir: /app
    command: sh -c "npm install && npm run dev:web"
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      # Next.js rewrites /api/* here (server-side, inside the compose network)
      API_URL: http://api:4000
      # keep container build cache separate from host-side `next build` output
      NEXT_DIST_DIR: .next-container
      # Web3Forms delivers the /support form straight from the browser. The
      # access key names the destination inbox, not the sender, so it is public
      # by design. Set WEB3FORMS_ACCESS_KEY in a root .env; without it the
      # support form renders disabled rather than failing on submit.
      NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${WEB3FORMS_ACCESS_KEY:-}
    volumes:
      - .:/app
      # keep Linux node_modules out of the macOS bind mount
      - web_node_modules:/app/node_modules

  api:
    image: node:22-bookworm-slim
    container_name: better-days-api
    working_dir: /app
    command: sh -c "npm install && npm run build:shared && npm run dev:api"
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://betterdays:betterdays@db:5432/betterdays
      JWT_SECRET: dev-only-secret-change-me
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: better-days-db
    ports:
      # 5432 on this machine is taken by another Postgres container
      - "5433:5432"
    environment:
      POSTGRES_USER: betterdays
      POSTGRES_PASSWORD: betterdays
      POSTGRES_DB: betterdays
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  web_node_modules:
  api_node_modules:
